<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking Cube Catcher</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .input_video {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror the video */
            z-index: 1;
            opacity: 0.6; /* Dim the video slightly so the game pops */
        }
        
        #threejs-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 2;
            pointer-events: none;
        }

        #ui-layer {
            position: absolute;
            top: 20px; left: 20px;
            color: white;
            z-index: 3;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        h1 { margin: 0; font-size: 24px; color: #00ffcc;}
        #score-display { font-size: 40px; font-weight: bold; margin-top: 5px; }
        
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; font-size: 24px;
            z-index: 4;
            background: rgba(0,0,0,0.8);
            padding: 20px; border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="loading">Loading Camera & Game Assets...</div>
    
    <div id="ui-layer">
        <h1>Cube Catcher</h1>
        <div id="score-display">Score: <span id="score">0</span></div>
    </div>

    <video class="input_video" autoplay playsinline></video>
    <canvas id="threejs-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        // ==========================================
        // 1. GAME VARIABLES & UI
        // ==========================================
        let score = 0;
        const scoreElement = document.getElementById('score');
        const loadingText = document.getElementById('loading');

        // ==========================================
        // 2. THREE.JS SETUP
        // ==========================================
        const canvas = document.getElementById('threejs-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // Player Cursor (The Finger)
        const cursorGeo = new THREE.SphereGeometry(0.5, 32, 32);
        const cursorMat = new THREE.MeshPhongMaterial({ color: 0xff3333, emissive: 0xaa0000 });
        const cursor = new THREE.Mesh(cursorGeo, cursorMat);
        scene.add(cursor);

        // Enemies / Targets (The Falling Cubes)
        const targetCount = 5;
        const targets = [];
        const targetGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const targetMat = new THREE.MeshPhongMaterial({ color: 0x00ffcc });

        // Function to spawn/reset a target at the top of the screen
        function resetTarget(target) {
            target.position.x = (Math.random() - 0.5) * 20; // Random X between -10 and 10
            target.position.y = 10 + Math.random() * 5;     // Start above the screen
            target.position.z = 0;
            target.userData.speed = 0.05 + Math.random() * 0.1; // Random fall speed
            target.rotation.set(Math.random(), Math.random(), Math.random());
        }

        // Create the targets
        for(let i = 0; i < targetCount; i++) {
            const cube = new THREE.Mesh(targetGeo, targetMat);
            resetTarget(cube);
            scene.add(cube);
            targets.push(cube);
        }

        camera.position.z = 10;

        // ==========================================
        // 3. GAME LOOP (Animation & Collision)
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            // Move targets downward
            targets.forEach(target => {
                target.position.y -= target.userData.speed;
                target.rotation.x += 0.02;
                target.rotation.y += 0.02;

                // ** COLLISION DETECTION **
                // Check distance between cursor and this target
                const distance = cursor.position.distanceTo(target.position);
                if (distance < 1.5) { // 1.5 is the hit radius
                    // Hit!
                    score++;
                    scoreElement.innerText = score;
                    
                    // Flash cursor white briefly to show a hit
                    cursor.material.emissive.setHex(0xffffff);
                    setTimeout(() => cursor.material.emissive.setHex(0xaa0000), 100);

                    resetTarget(target); // Send it back to the top
                }

                // If target falls past the bottom of the screen, reset it
                if (target.position.y < -10) {
                    resetTarget(target);
                }
            });

            renderer.render(scene, camera);
        }
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 4. MEDIAPIPE HAND TRACKING
        // ==========================================
        const videoElement = document.querySelector('.input_video');
        
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            if (loadingText.style.display !== 'none') {
                loadingText.style.display = 'none'; // Hide loading UI
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const indexFinger = results.multiHandLandmarks[0][8];

                // Map standard coordinates to Three.js world space
                const targetX = -(indexFinger.x - 0.5) * 25; 
                const targetY = -(indexFinger.y - 0.5) * 18;

                // Smooth movement using LERP (Linear Interpolation)
                cursor.position.x += (targetX - cursor.position.x) * 0.3;
                cursor.position.y += (targetY - cursor.position.y) * 0.3;
            }
        });

        // ==========================================
        // 5. START WEBCAM
        // ==========================================
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        cameraUtils.start();

    </script>
</body>
</html>
