<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Dodger - Hand Tracking Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        .input_video {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; transform: scaleX(-1);
            z-index: 1; opacity: 0.4; filter: grayscale(50%); /* Stylized background */
        }
        
        #threejs-canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 2; pointer-events: none;
        }

        #ui-layer {
            position: absolute; top: 20px; left: 20px; width: calc(100% - 40px);
            color: white; z-index: 3; display: flex; justify-content: space-between;
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
        }

        .hud-text { font-size: 32px; font-weight: bold; margin: 0; }
        .score { color: #00ffff; }
        .lives { color: #ff3366; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8); z-index: 4;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }

        #overlay h1 { font-size: 48px; margin-bottom: 10px; color: #ff3366; }
        #overlay p { font-size: 24px; color: #aaa; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="overlay-title">Loading AI Camera...</h1>
        <p id="overlay-subtitle">Please wait.</p>
    </div>
    
    <div id="ui-layer">
        <div class="hud-text score">Score: <span id="score">0</span></div>
        <div class="hud-text lives">Lives: <span id="lives">3</span></div>
    </div>

    <video class="input_video" autoplay playsinline></video>
    <canvas id="threejs-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        // --- Game State ---
        let score = 0;
        let lives = 3;
        let isGameOver = false;
        let baseSpeed = 0.01; // Increases as you play

        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlaySubtitle = document.getElementById('overlay-subtitle');

        // --- Three.js Setup ---
        const canvas = document.getElementById('threejs-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // Player Cursor
        const cursorGeo = new THREE.SphereGeometry(0.6, 32, 32);
        const cursorMat = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0xaa00aa });
        const cursor = new THREE.Mesh(cursorGeo, cursorMat);
        scene.add(cursor);

        // Enemies & Points
        const items = [];
        
        // Geometries & Materials
        const goodGeo = new THREE.TorusGeometry(0.7, 0.2, 16, 32); // Ring
        const goodMat = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x004444 });
        
        const badGeo = new THREE.IcosahedronGeometry(0.8, 0); // Spiky shape
        const badMat = new THREE.MeshPhongMaterial({ color: 0xff3366, emissive: 0x550000 });

        function createItem(type) {
            const isGood = type === 'good';
            const mesh = new THREE.Mesh(isGood ? goodGeo : badGeo, isGood ? goodMat : badMat);
            mesh.userData = { type: type, speedOffset: Math.random() * 0.01 };
            resetItem(mesh);
            scene.add(mesh);
            items.push(mesh);
        }

        function resetItem(item) {
            item.position.x = (Math.random() - 0.5) * 25; 
            item.position.y = 12 + Math.random() * 10; // Staggered spawn heights
            item.position.z = 0;
            item.rotation.set(Math.random(), Math.random(), 0);
        }

        // Spawn initial items (3 good, 2 bad)
        for(let i=0; i<3; i++) createItem('good');
        for(let i=0; i<2; i++) createItem('bad');

        camera.position.z = 10;

        // --- Game Logic ---
        function loseLife() {
            lives--;
            livesEl.innerText = lives;
            // Flash screen red
            document.body.style.backgroundColor = "#500";
            setTimeout(() => document.body.style.backgroundColor = "#050510", 100);

            if (lives <= 0) {
                isGameOver = true;
                overlay.style.display = 'flex';
                overlayTitle.innerText = "GAME OVER";
                overlayTitle.style.color = "#ff3366";
                overlaySubtitle.innerText = `Final Score: ${score}\nRefresh page to try again.`;
            }
        }

        function animate() {
            if (isGameOver) return; // Stop loop if dead
            requestAnimationFrame(animate);

            // Difficulty curve: speed up slightly based on score
            const currentSpeed = baseSpeed + (score * 0.002);

            items.forEach(item => {
                // Movement
                item.position.y -= (currentSpeed + item.userData.speedOffset);
                item.rotation.x += 0.03;
                item.rotation.y += 0.03;

                // Collision Check
                if (cursor.position.distanceTo(item.position) < 1.5) {
                    if (item.userData.type === 'good') {
                        score += 10;
                        scoreEl.innerText = score;
                        cursor.material.emissive.setHex(0x00ffff); // Flash cursor blue
                        setTimeout(() => cursor.material.emissive.setHex(0xaa00aa), 100);
                    } else {
                        loseLife();
                    }
                    resetItem(item); // Poof, it's gone and respawns
                }

                // Missed object falling off screen
                if (item.position.y < -12) {
                    // If you let a good item drop, you lose a life!
                    if (item.userData.type === 'good') {
                        loseLife();
                    }
                    resetItem(item);
                }
            });

            renderer.render(scene, camera);
        }

        // --- MediaPipe Hand Tracking Setup ---
        const videoElement = document.querySelector('.input_video');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});

        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        hands.onResults((results) => {
            if (overlayTitle.innerText === "Loading AI Camera...") {
                overlay.style.display = 'none'; // Hide loading screen
                animate(); // Start the game loop!
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const indexFinger = results.multiHandLandmarks[0][8];
                const targetX = -(indexFinger.x - 0.5) * 30; // Wider movement range
                const targetY = -(indexFinger.y - 0.5) * 20;

                cursor.position.x += (targetX - cursor.position.x) * 0.4; // Snappier movement
                cursor.position.y += (targetY - cursor.position.y) * 0.4;
            }
        });

        // Start Camera
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraUtils.start();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
