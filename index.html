<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Farming Tycoon 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Segoe UI', Tahoma, sans-serif; touch-action: none; }
        
        #threejs-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* Mobile-friendly Webcam */
        .input_video {
            position: absolute; bottom: 20px; right: 20px;
            width: 240px; height: 180px; object-fit: cover; transform: scaleX(-1);
            border: 3px solid #fff; border-radius: 12px; z-index: 3;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* UI Styling */
        #ui-layer {
            position: absolute; top: 20px; left: 20px; color: white; z-index: 3;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none;
        }
        .stat { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .gold-text { color: #FFD700; }
        .money-text { color: #00FF55; font-size: 36px; }

        /* Instructions & Status */
        #instruction-bar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 165, 0, 0.9); color: white; padding: 10px 20px;
            border-radius: 30px; font-size: 20px; font-weight: bold; z-index: 3;
            text-align: center; border: 2px solid white;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } 100% { transform: translateX(-50%) scale(1); } }

        #status-box {
            position: absolute; bottom: 20px; left: 20px; background: rgba(0, 0, 0, 0.7);
            color: white; padding: 15px; border-radius: 8px; font-size: 20px; z-index: 3;
        }

        /* Interactive Buttons */
        .btn-zone {
            position: absolute; right: 20px; width: 150px; height: 120px;
            border: 4px solid white; border-radius: 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; font-size: 18px; font-weight: bold; z-index: 3; text-align: center;
        }
        #sell-zone { top: 20px; background: rgba(255, 50, 50, 0.8); box-shadow: 0 0 15px rgba(255,0,0,0.5); }
        #buy-zone { top: 160px; background: rgba(50, 100, 255, 0.8); box-shadow: 0 0 15px rgba(0,100,255,0.5); }
        
        .progress-bg { width: 80%; height: 15px; background: #222; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; }
        #sell-bar { background: #00FF55; }
        #buy-bar { background: #00FFFF; }

        /* The Hand Cursor */
        #cursor {
            position: absolute; top: 50%; left: 50%; width: 25px; height: 25px;
            background: red; border: 3px solid white; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 10; pointer-events: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); display: none;
        }

        /* MOBILE RESPONSIVE RULES */
        @media (max-width: 768px) {
            .stat { font-size: 16px; }
            .money-text { font-size: 24px; }
            #instruction-bar { font-size: 14px; top: 10px; width: 80vw; }
            
            .btn-zone { width: 100px; height: 90px; font-size: 12px; right: 10px; border-width: 2px;}
            #sell-zone { top: 60px; }
            #buy-zone { top: 160px; }
            
            .input_video { width: 120px; height: 160px; bottom: 10px; right: 10px; }
            #status-box { font-size: 14px; bottom: 10px; left: 10px; max-width: 50vw; padding: 10px; }
            #ui-layer { top: 10px; left: 10px; }
        }
    </style>
</head>
<body>

    <div id="instruction-bar">🏃‍♂️ ACTION: Squat down & pull hands up to harvest!</div>

    <div id="ui-layer">
        <div class="stat">Plant: <span id="garden-name">Carrot</span></div>
        <div class="stat money-text">Bank: $<span id="money">0</span></div>
        <div class="stat">Crops: <span id="inv-normal">0</span></div>
        <div class="stat gold-text">Gold Crops: <span id="inv-gold">0</span></div>
    </div>
    
    <div id="sell-zone" class="btn-zone">
        SELL ALL
        <div class="progress-bg"><div id="sell-bar" class="progress-bar"></div></div>
    </div>

    <div id="buy-zone" class="btn-zone">
        UPGRADE<br>$<span id="garden-cost">100</span>
        <div class="progress-bg"><div id="buy-bar" class="progress-bar"></div></div>
    </div>

    <div id="status-box">Loading AI Camera...</div>
    <div id="cursor"></div>

    <video class="input_video" autoplay playsinline></video>
    <canvas id="threejs-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <script>
        // ==========================================
        // 1. GAME ECONOMY & LEVELS
        // ==========================================
        const levels = [
            { name: "Carrot", price: 5, upgradeCost: 100, geo: new THREE.ConeGeometry(0.4, 1.5, 12), color: 0xff8800, ground: 0x5C4033 },
            { name: "Potato", price: 15, upgradeCost: 200, geo: new THREE.DodecahedronGeometry(0.5, 0), color: 0x8B4513, ground: 0x4A3525 },
            { name: "Tomato", price: 25, upgradeCost: 300, geo: new THREE.SphereGeometry(0.5, 16, 16), color: 0xff3333, ground: 0x3B2F2F },
            { name: "Watermelon", price: 50, upgradeCost: 400, geo: new THREE.SphereGeometry(0.8, 16, 16), color: 0x006400, ground: 0x2E1E1E },
            { name: "Banana", price: 100, upgradeCost: null, geo: new THREE.TorusGeometry(0.5, 0.2, 8, 16, Math.PI), color: 0xFFE135, ground: 0x1A1111 }
        ];

        let currentLevel = 0; // Starts at 0 (Carrot)
        let inventory = { normal: 0, gold: 0 };
        let money = 0;
        
        let sellHoverTimer = 0;
        let buyHoverTimer = 0;
        let isReachingDown = false;

        const uiNormal = document.getElementById('inv-normal');
        const uiGold = document.getElementById('inv-gold');
        const uiMoney = document.getElementById('money');
        const uiGardenName = document.getElementById('garden-name');
        const uiCost = document.getElementById('garden-cost');
        const statusBox = document.getElementById('status-box');
        
        const sellBar = document.getElementById('sell-bar');
        const buyBar = document.getElementById('buy-bar');
        const cursorEl = document.getElementById('cursor');
        const buyZone = document.getElementById('buy-zone');

        // ==========================================
        // 2. THREE.JS SETUP & GENERATION
        // ==========================================
        const canvas = document.getElementById('threejs-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const groundMat = new THREE.MeshPhongMaterial({ color: levels[0].ground });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        let cropsArray = []; 
        const leafMat = new THREE.MeshPhongMaterial({ color: 0x228B22 });
        const goldMat = new THREE.MeshPhongMaterial({ color: 0xFFD700, shininess: 100, specular: 0xffffff });

        // Helper function to spawn just ONE crop
        function spawnSingleCrop() {
            const currentData = levels[currentLevel];
            const isGold = Math.random() < 0.2;
            const normalMat = new THREE.MeshPhongMaterial({ color: currentData.color });
            const crop = new THREE.Mesh(currentData.geo, isGold ? goldMat : normalMat);
            
            crop.userData = { isGold: isGold }; 
            
            // Shape adjustments based on crop type
            if (currentData.name === "Carrot") {
                crop.rotation.x = Math.PI; 
            } else if (currentData.name === "Banana") {
                crop.rotation.z = Math.PI / 4; // Tilt bananas slightly
            }

            crop.position.set((Math.random() - 0.5) * 30, -0.2, (Math.random() - 0.5) * 20);
            
            // Add leaves
            if (currentData.name !== "Banana") {
                const leaf = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), leafMat);
                leaf.position.y = (currentData.name === "Carrot") ? -1.0 : 0.6;
                crop.add(leaf);
            }

            // Animate it growing out of the dirt!
            crop.scale.set(0, 0, 0);
            gsap.to(crop.scale, { x: 1, y: 1, z: 1, duration: 0.5, ease: "back.out(1.5)" });

            scene.add(crop);
            cropsArray.push(crop);
        }

        // Fills the whole garden
        function plantGarden() {
            // Clear old crops
            cropsArray.forEach(crop => scene.remove(crop));
            cropsArray = [];

            const currentData = levels[currentLevel];
            groundMat.color.setHex(currentData.ground); // Update dirt color

            for(let i = 0; i < 50; i++) {
                spawnSingleCrop();
            }
        }
        
        plantGarden(); // Start game

        camera.position.set(0, 8, 20);
        camera.lookAt(0, 0, 0);

        function animate3D() { requestAnimationFrame(animate3D); renderer.render(scene, camera); }
        animate3D();

        // Handle Screen Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 3. GAMEPLAY LOGIC 
        // ==========================================
        function harvestCrop() {
            if (cropsArray.length === 0) return;

            const index = Math.floor(Math.random() * cropsArray.length);
            const target = cropsArray[index];
            cropsArray.splice(index, 1);

            if (target.userData.isGold) {
                inventory.gold++;
                uiGold.innerText = inventory.gold;
                statusBox.innerText = `✨ GOLD ${levels[currentLevel].name.toUpperCase()}! ✨`;
                statusBox.style.color = "#FFD700";
            } else {
                inventory.normal++;
                uiNormal.innerText = inventory.normal;
                statusBox.innerText = `🌱 ${levels[currentLevel].name} Harvested!`;
                statusBox.style.color = "white";
            }

            // Animate flying up and disappearing, then SPAWN A NEW ONE!
            gsap.to(target.position, { y: 5, duration: 0.5, ease: "back.out(1.7)" });
            gsap.to(target.rotation, { z: Math.PI * 2, duration: 0.8 });
            gsap.to(target.scale, { x: 0, y: 0, z: 0, duration: 0.3, delay: 0.5, onComplete: () => {
                scene.remove(target);
                spawnSingleCrop(); // Infinite respawn magic!
            }});
        }

        function sellItems() {
            if (inventory.normal === 0 && inventory.gold === 0) return;

            const basePrice = levels[currentLevel].price;
            const goldPrice = basePrice * 2; // Gold is exactly 2x the base price
            
            const profit = (inventory.normal * basePrice) + (inventory.gold * goldPrice);
            money += profit;
            
            uiMoney.innerText = money;
            inventory.normal = 0; inventory.gold = 0;
            uiNormal.innerText = 0; uiGold.innerText = 0;

            statusBox.innerText = `SOLD for $${profit}! 💰`;
            statusBox.style.color = "#00FF55";
        }

        function buyGarden() {
            const upgradeCost = levels[currentLevel].upgradeCost;

            if (upgradeCost === null) {
                statusBox.innerText = "You are at MAX LEVEL!";
                return;
            }

            if (money >= upgradeCost) {
                money -= upgradeCost;
                uiMoney.innerText = money;
                
                currentLevel++; // Go to next level
                const newData = levels[currentLevel];
                
                uiGardenName.innerText = newData.name;
                
                if (newData.upgradeCost === null) {
                    buyZone.innerHTML = "MAX LEVEL<br>REACHED!";
                    buyZone.style.background = "gold";
                } else {
                    uiCost.innerText = newData.upgradeCost;
                }
                
                plantGarden();

                statusBox.innerText = `UPGRADED TO ${newData.name.toUpperCase()}! 🏡`;
                statusBox.style.color = "#00FFFF";
                buyZone.style.boxShadow = "0 0 30px #00FFFF";
                setTimeout(() => buyZone.style.boxShadow = "0 0 15px rgba(0,100,255,0.5)", 500);
            } else {
                statusBox.innerText = `Need $${upgradeCost} to upgrade!`;
                statusBox.style.color = "red";
            }
        }

        // ==========================================
        // 4. MEDIAPIPE AI 
        // ==========================================
        const videoElement = document.querySelector('.input_video');
        const pose = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        pose.onResults((results) => {
            if (!results.poseLandmarks) { cursorEl.style.display = "none"; return; }

            // 1. HARVESTING (Squatting/Pulling)
            const wristsY = (results.poseLandmarks[15].y + results.poseLandmarks[16].y) / 2; 
            const hipsY = (results.poseLandmarks[23].y + results.poseLandmarks[24].y) / 2;

            if (wristsY > hipsY + 0.1) {
                isReachingDown = true;
                document.getElementById('instruction-bar').style.background = "#00FF55";
            } else if (wristsY < hipsY - 0.1 && isReachingDown) {
                isReachingDown = false;
                document.getElementById('instruction-bar').style.background = "rgba(255, 165, 0, 0.9)";
                harvestCrop();
            }

            // 2. UI CURSOR LOGIC 
            const rightWrist = results.poseLandmarks[15];
            const cursorX = (1 - rightWrist.x) * window.innerWidth;
            const cursorY = rightWrist.y * window.innerHeight;

            cursorEl.style.display = "block";
            cursorEl.style.left = `${cursorX}px`;
            cursorEl.style.top = `${cursorY}px`;

            function checkHover(zoneId, barEl, timerObj, actionFunc) {
                const btn = document.getElementById(zoneId).getBoundingClientRect();
                if (cursorX > btn.left && cursorX < btn.right && cursorY > btn.top && cursorY < btn.bottom) {
                    timerObj.val += 3; 
                    if (timerObj.val >= 100) {
                        actionFunc();
                        timerObj.val = 0; 
                    }
                } else {
                    if (timerObj.val > 0) timerObj.val -= 5;
                }
                if (timerObj.val < 0) timerObj.val = 0;
                if (barEl) barEl.style.width = `${timerObj.val}%`;
            }

            let sellTimerWrapper = { val: sellHoverTimer };
            let buyTimerWrapper = { val: buyHoverTimer };

            checkHover('sell-zone', sellBar, sellTimerWrapper, sellItems);
            
            if (levels[currentLevel].upgradeCost !== null) {
                checkHover('buy-zone', buyBar, buyTimerWrapper, buyGarden);
            }

            sellHoverTimer = sellTimerWrapper.val;
            buyHoverTimer = buyTimerWrapper.val;
        });

        const cameraUtils = new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, width: 640, height: 480 });
        cameraUtils.start();
    </script>
</body>
</html>
