<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Body 3D Farming</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* 3D Game Canvas */
        #threejs-canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1;
        }

        /* Picture-in-Picture Webcam */
        .input_video {
            position: absolute; bottom: 20px; right: 20px;
            width: 320px; height: 240px;
            object-fit: cover; transform: scaleX(-1);
            border: 4px solid #fff; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 3;
        }

        /* UI Overlays */
        #ui-layer {
            position: absolute; top: 20px; left: 20px;
            color: white; z-index: 3;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        #score-display { font-size: 32px; font-weight: bold; }
        
        #status-box {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.7); color: white;
            padding: 15px 25px; border-radius: 8px;
            font-size: 24px; font-weight: bold; z-index: 3;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="score-display">Carrots Harvested: <span id="score">0</span> / 10</div>
    </div>
    
    <div id="status-box">Loading AI Camera... Please wait.</div>

    <video class="input_video" autoplay playsinline></video>
    <canvas id="threejs-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <script>
        // ==========================================
        // 1. GAME VARIABLES
        // ==========================================
        let score = 0;
        const totalCarrots = 10;
        const scoreEl = document.getElementById('score');
        const statusBox = document.getElementById('status-box');
        let isReachingDown = false;

        // ==========================================
        // 2. THREE.JS SETUP (The 3D Farm)
        // ==========================================
        const canvas = document.getElementById('threejs-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x5C4033 }); // Dirt
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Planting Carrots
        const carrots = [];
        const carrotGeo = new THREE.ConeGeometry(0.5, 2, 16);
        const carrotMat = new THREE.MeshPhongMaterial({ color: 0xff8800 }); 
        const leafGeo = new THREE.BoxGeometry(0.2, 1, 0.2);
        const leafMat = new THREE.MeshPhongMaterial({ color: 0x228B22 });

        for(let i = 0; i < totalCarrots; i++) {
            const carrot = new THREE.Mesh(carrotGeo, carrotMat);
            carrot.rotation.x = Math.PI; 
            carrot.position.set((Math.random() - 0.5) * 15, -0.5, (Math.random() - 0.5) * 15);
            
            const leaf = new THREE.Mesh(leafGeo, leafMat);
            leaf.position.y = -1.2; 
            carrot.add(leaf);

            scene.add(carrot);
            carrots.push(carrot);
        }

        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        // Render Loop
        function animate3D() {
            requestAnimationFrame(animate3D);
            renderer.render(scene, camera);
        }
        animate3D();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 3. GAMEPLAY LOGIC
        // ==========================================
        function harvestCarrot() {
            if (carrots.length === 0) {
                statusBox.innerText = "Farm is empty! Refresh to play again.";
                statusBox.style.color = "white";
                return;
            }

            // Pick a random carrot
            const index = Math.floor(Math.random() * carrots.length);
            const targetCarrot = carrots[index];
            carrots.splice(index, 1); // Remove from array

            // Animate flying out
            gsap.to(targetCarrot.position, { y: 5, duration: 0.5, ease: "back.out(1.7)" });
            gsap.to(targetCarrot.rotation, { z: Math.PI * 2, duration: 0.8 });
            gsap.to(targetCarrot.scale, { 
                x: 0, y: 0, z: 0, duration: 0.3, delay: 0.5,
                onComplete: () => scene.remove(targetCarrot) 
            });

            score++;
            scoreEl.innerText = score;
        }

        // ==========================================
        // 4. MEDIAPIPE FULL BODY TRACKING
        // ==========================================
        const videoElement = document.querySelector('.input_video');
        
        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});

        pose.setOptions({
            modelComplexity: 1, smoothLandmarks: true,
            minDetectionConfidence: 0.6, minTrackingConfidence: 0.6
        });

        pose.onResults((results) => {
            if (!results.poseLandmarks) {
                if (statusBox.innerText !== "Farm is empty! Refresh to play again.") {
                    statusBox.innerText = "Step back! Show your whole body.";
                    statusBox.style.color = "#ffcc00";
                }
                return;
            }

            // Get body landmarks (Y: 0 is top of screen, 1 is bottom)
            const wristsY = (results.poseLandmarks[15].y + results.poseLandmarks[16].y) / 2; 
            const hipsY = (results.poseLandmarks[23].y + results.poseLandmarks[24].y) / 2;

            // Gesture: Reaching down past hips
            if (wristsY > hipsY + 0.1) {
                if (!isReachingDown) {
                    isReachingDown = true;
                    statusBox.innerText = "Reaching down... now PULL UP!";
                    statusBox.style.color = "#00ffff";
                }
            } 
            // Gesture: Pulling hands back up above hips
            else if (wristsY < hipsY - 0.1 && isReachingDown) {
                isReachingDown = false;
                
                // TRIGGER THE GAME MECHANIC
                harvestCarrot();
                
                statusBox.innerText = "🥕 CARROT PULLED! 🥕";
                statusBox.style.color = "#00ffcc";
                
                setTimeout(() => { 
                    if (carrots.length > 0) {
                        statusBox.innerText = "Ready. Reach down to harvest."; 
                        statusBox.style.color = "white"; 
                    }
                }, 1000);
            } 
            // Default resting state
            else if (!isReachingDown && statusBox.innerText !== "🥕 CARROT PULLED! 🥕" && carrots.length > 0) {
                statusBox.innerText = "Ready. Reach down to harvest.";
                statusBox.style.color = "white";
            }
        });

        // Start Webcam
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraUtils.start();

    </script>
</body>
</html>
